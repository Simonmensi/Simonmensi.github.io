name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build (SSR verification)
        run: npm run build
        env:
          # Dummy URL so the build compiles without a live DB.
          # No actual connection is made during `next build`.
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"
